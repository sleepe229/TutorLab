name: CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '20'

jobs:
  # ── Backend tests ──────────────────────────────────────────────────────────
  backend:
    name: Backend — Test & Build
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run tests
        run: ./mvnw verify -B
        env:
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_DATA_REDIS_PORT: 6379

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: backend-test-report
          path: target/surefire-reports/

      - name: Build JAR
        run: ./mvnw package -DskipTests -B

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/TutorLab-*.jar
          retention-days: 7

  # ── Frontend tests & build ─────────────────────────────────────────────────
  frontend:
    name: Frontend — Test & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npx vitest run --reporter=verbose
        continue-on-error: true  # не блокировать CI до написания тестов

      - name: Build
        run: npx vite build
        env:
          VITE_API_URL: /api
          VITE_WS_URL: ""

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ── Security: dependency scan ──────────────────────────────────────────────
  security-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: npm audit
        working-directory: frontend
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: OWASP Dependency Check
        run: ./mvnw org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=9 -DnvdApiKey=${{ secrets.NVD_API_KEY }}
        continue-on-error: true

  # ── Docker build (only on main) ────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Build Docker image
        run: |
          docker build \
            --build-arg VITE_API_URL=/api \
            -t tutorlab:${{ github.sha }} \
            -t tutorlab:latest \
            .

      # Uncomment when registry is configured:
      # - name: Log in to registry
      #   uses: docker/login-action@v3
      #   with:
      #     registry: ghcr.io
      #     username: ${{ github.actor }}
      #     password: ${{ secrets.GITHUB_TOKEN }}
      # - name: Push image
      #   run: docker push ghcr.io/${{ github.repository }}/tutorlab:${{ github.sha }}
