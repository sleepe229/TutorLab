services:

  # ── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Backend ──────────────────────────────────────────────────────────────
  app:
    image: tutorlab:${APP_VERSION:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      APP_CORS_ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://yourdomain.com}
      APP_JWT_SECRET: ${JWT_SECRET}
      APP_SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-24}
      APP_UPLOAD_DIR: /app/uploads
      APP_UPLOAD_MATERIALS_DIR: /app/uploads/materials
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      JAVA_OPTS: "-Xms256m -Xmx512m"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal
      - external
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Nginx ────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      - app
    networks:
      - external
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 60s

networks:
  internal:
    driver: bridge
    internal: true
  external:
    driver: bridge

volumes:
  redis_data:
  uploads_data:
  nginx_cache:
