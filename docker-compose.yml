version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: tutorlab-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:18-alpine
    container_name: tutorlab-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: tutorlab
      POSTGRES_USER: tutorlab
      POSTGRES_PASSWORD: tutorlab
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tutorlab"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis-data:
    driver: local
  postgres-data:
    driver: local

