spring.application.name=TutorLab

# Redis Configuration (ephemeral: live sessions + refresh tokens only)
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms

# PostgreSQL (persistent data)
spring.datasource.url=jdbc:postgresql://localhost:5432/tutorlab
spring.datasource.username=tutorlab
spring.datasource.password=tutorlab
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Server Configuration
server.port=8080

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Upload Directory
app.upload.dir=users-photos
app.upload.materials.dir=materials

# TTL Configuration
app.session.ttl-hours=24
app.tutor.ttl-days=30
app.student.ttl-days=30
app.live-session.ttl-hours=6

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized
management.endpoint.health.probes.enabled=true

# JWT
app.jwt.secret=TutorLabSuperSecretKeyForJWTSigningMustBe256BitsLong12345
app.jwt.access-ttl-minutes=15
app.jwt.refresh-ttl-days=30

# Rate limiting
app.rate-limit.login-attempts=5
app.rate-limit.login-window-seconds=60
app.rate-limit.register-attempts=3
app.rate-limit.register-window-seconds=300

# CORS (was hardcoded, now configurable)
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# Response compression
server.compression.enabled=true
server.compression.mime-types=text/html,text/css,application/javascript,application/json,application/xml
server.compression.min-response-size=1024

# Logging
logging.level.project.TutorLab=INFO

# Graceful Shutdown
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s

# Snapshot TTL (Redis — 365d default)
# Governance: Redis is not permanent storage. Migration path: at >10K active students,
# offload snapshot.slideDrawings to S3 and keep only the S3 reference here.
app.snapshot.ttl-days=365

# IndexNow (Bing/Yandex crawl notification)
app.indexnow.host=tutorlab.onrender.com
app.indexnow.key=b9d3f1a8e5c2d7f0
app.indexnow.enabled=false

# Claude API (AI recap generation)
# Set CLAUDE_API_KEY env var in production. Leave empty to disable recap generation.
app.claude.api-key=${CLAUDE_API_KEY:}
app.claude.model=claude-haiku-4-5-20251001
app.claude.enabled=true
app.claude.timeout-seconds=30

# Chat message encryption (AES-256-GCM)
# Must be a Base64-encoded 32-byte key. Generate: python3 -c "import secrets,base64; print(base64.b64encode(secrets.token_bytes(32)).decode())"
app.chat.encryption-key=lwkMaI4WHCqeGGZX0MxsxAEAmZNKUJvCnDlZKY6XNIk=

# Google OAuth 2.0 (Sign in with Google)
# Get your Client ID from Google Cloud Console → APIs & Services → Credentials
# Leave empty to disable Google Sign-In
app.google.client-id=${GOOGLE_CLIENT_ID:}
