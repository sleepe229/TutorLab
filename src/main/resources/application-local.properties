# Local development/testing profile — activate with: -Dspring.profiles.active=local
# Overrides application.properties defaults with test-friendly values

# JWT: long TTL so tokens don't expire mid-test
app.jwt.access-ttl-minutes=1440
app.jwt.refresh-ttl-days=30

# Sessions: longer TTL for manual testing
app.live-session.ttl-hours=24

# Verbose logging for debugging
logging.level.project.TutorLab=DEBUG
logging.level.org.springframework.web=DEBUG

# Disable Claude AI recap (no API key needed locally)
app.claude.enabled=false

# Rate limiting: relaxed for local testing
app.rate-limit.login-attempts=100
app.rate-limit.login-window-seconds=60
app.rate-limit.register-attempts=100
app.rate-limit.register-window-seconds=300

# CORS: allow both Vite ports
app.cors.allowed-origins=http://localhost:80,http://localhost:3000,http://localhost:5173

# IndexNow: disabled locally
app.indexnow.enabled=false

# Actuator: expose all endpoints
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always