# Production profile — overrides application.properties
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:redis}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD}

# Use /app/uploads volume in Docker
app.upload.dir=${APP_UPLOAD_DIR:/app/uploads}
app.upload.materials.dir=${APP_UPLOAD_MATERIALS_DIR:/app/uploads/materials}

# JWT
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.access-ttl-minutes=15
app.jwt.refresh-ttl-days=30

# CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:https://yourdomain.com}

# Logging: JSON for structured output in prod
logging.level.root=WARN
logging.level.project.TutorLab=INFO

# Frontend static files (bundled into /app/static by Dockerfile)
spring.web.resources.static-locations=classpath:/static/,file:/app/static/
spring.web.resources.cache.cachecontrol.max-age=3600

# Disable debug endpoints
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
