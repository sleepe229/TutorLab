# Production profile overrides application.properties
server.port=${PORT:8080}

# PostgreSQL — DatabaseUrlEnvironmentPostProcessor converts DATABASE_URL to JDBC format at startup.
# The placeholders below are fallbacks for local docker-compose (SPRING_DATASOURCE_URL overrides all).
# On Render, DATABASE_URL is injected automatically via "Link Database".
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:tutorlab}?sslmode=require
spring.datasource.username=${PGUSER:tutorlab}
spring.datasource.password=${PGPASSWORD:}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
# Render provides REDIS_URL as rediss://... (TLS). If set, it takes priority.
# Fallback to individual host/port/password for docker-compose/self-hosted.
spring.data.redis.url=${REDIS_URL:}
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:redis}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${REDIS_SSL_ENABLED:false}

# Use /app/uploads volume in Docker
app.upload.dir=${APP_UPLOAD_DIR:/app/uploads}
app.upload.materials.dir=${APP_UPLOAD_MATERIALS_DIR:/app/uploads/materials}

# JWT
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.access-ttl-minutes=15
app.jwt.refresh-ttl-days=30

# CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:https://yourdomain.com}

# Logging: JSON for structured output in prod
logging.level.root=WARN
logging.level.project.TutorLab=INFO

# Frontend static files (bundled into /app/static by Dockerfile)
spring.web.resources.static-locations=classpath:/static/,file:/app/static/
# Hashed Vite assets are immutable — cache for 1 year
spring.web.resources.cache.cachecontrol.max-age=31536000
spring.web.resources.cache.cachecontrol.cache-public=true

# IndexNow
app.indexnow.host=tutorlab.onrender.com
app.indexnow.key=${INDEXNOW_KEY:b9d3f1a8e5c2d7f0}
app.indexnow.enabled=true

# Claude API key for lesson recap generation
app.claude.api-key=${CLAUDE_API_KEY:}

# Google OAuth 2.0
app.google.client-id=${GOOGLE_CLIENT_ID:}

# Disable debug endpoints
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
